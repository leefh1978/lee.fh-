<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思539考点词</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f13;--surface:#1a1a24;--card:#22222e;--border:#2e2e3e;
  --accent:#6c63ff;--green:#43e97b;--yellow:#f7c948;--red:#ff6b6b;
  --text:#e8e8f0;--muted:#6b6b80;--r:14px;
  --c1:#6c63ff;--c2:#00c9a7;--c3:#ff9f43;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
nav{display:flex;align-items:center;gap:6px;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{font-size:17px;font-weight:700;color:var(--accent);margin-right:auto}
.nb{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;background:transparent;color:var(--muted)}
.nb:hover{color:var(--text);background:var(--card)}
.nb.active{background:var(--accent);color:#fff}
.page{display:none;padding:20px;max-width:920px;margin:0 auto}
.page.active{display:block}
.cat-badge{display:inline-block;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:700}
.cb1{background:rgba(108,99,255,.15);color:var(--c1);border:1px solid rgba(108,99,255,.3)}
.cb2{background:rgba(0,201,167,.15);color:var(--c2);border:1px solid rgba(0,201,167,.3)}
.cb3{background:rgba(255,159,67,.15);color:var(--c3);border:1px solid rgba(255,159,67,.3)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.sn{font-size:26px;font-weight:700}
.sl{font-size:12px;color:var(--muted);margin-top:3px}
.sc-blue .sn{color:var(--accent)}.sc-green .sn{color:var(--green)}.sc-yellow .sn{color:var(--yellow)}.sc-red .sn{color:var(--red)}
.prog-wrap{background:var(--card);border-radius:100px;height:7px;margin-bottom:20px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:100px;transition:width .5s}
.cat-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.cat-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.cs-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-weight:600;font-size:14px}
.cs-bar{height:5px;background:var(--card);border-radius:100px;overflow:hidden;margin-bottom:6px}
.cs-fill{height:100%;border-radius:100px;transition:width .5s}
.cs1 .cs-fill{background:var(--c1)}.cs2 .cs-fill{background:var(--c2)}.cs3 .cs-fill{background:var(--c3)}
.cs-nums{font-size:12px;color:var(--muted)}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#7c75ff}
.btn-g{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:#000}.btn-red{background:var(--red);color:#fff}.btn-yellow{background:var(--yellow);color:#000}
.btn-sm{padding:5px 12px;font-size:12px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.pill-row{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:5px 13px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.pill:hover{color:var(--text)}
.pa-all.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pa-1.active{background:var(--c1);color:#fff;border-color:var(--c1)}
.pa-2.active{background:var(--c2);color:#000;border-color:var(--c2)}
.pa-3.active{background:var(--c3);color:#000;border-color:var(--c3)}
.pa-status.active{background:var(--muted);color:#fff;border-color:var(--muted)}
.fc-top{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fc-auto{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-left:auto;cursor:pointer}
.fc-auto input{cursor:pointer;accent-color:var(--accent)}
.card-area{perspective:1200px;margin-bottom:16px}
.flashcard{width:100%;height:300px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;user-select:none}
.flashcard.flipped{transform:rotateY(180deg)}
.cf{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;border:1px solid var(--border);background:var(--surface)}
.cf-back{transform:rotateY(180deg);background:linear-gradient(135deg,#1c1c2e,#252535)}
.card-tl{position:absolute;top:12px;left:14px;display:flex;gap:6px;align-items:center}
.card-tr{position:absolute;top:12px;right:14px;font-size:12px;color:var(--muted)}
.fc-word{font-size:40px;font-weight:700;text-align:center;margin-bottom:8px}
.fc-hint{font-size:12px;color:var(--muted)}
.speak-btn{position:absolute;bottom:12px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:14px;color:var(--muted);transition:all .15s;z-index:2}
.speak-btn:hover{color:var(--accent);border-color:var(--accent)}
.speak-btn.on{color:var(--green);border-color:var(--green)}
.fc-meaning{font-size:20px;font-weight:600;color:var(--c1);text-align:center;margin-bottom:10px}

/* Synonyms area */
.fc-syns{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:0}
.syn-chip{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);padding:4px 12px;border-radius:100px;color:var(--text);font-size:12px;cursor:pointer;transition:all .2s;user-select:none}
.syn-chip:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.syn-chip.active{border-color:var(--green);color:var(--green);background:rgba(67,233,123,.08)}
.syn-chip .chip-icon{font-size:11px;opacity:.6}

/* Translation popup below synonyms */
.syn-translation{margin-top:10px;min-height:24px;text-align:center;font-size:13px;color:var(--yellow);transition:all .2s;font-weight:500}

.card-marks{display:flex;gap:10px;justify-content:center;margin-top:12px}
.card-marks .btn{flex:1;max-width:140px;text-align:center}
.fc-prog{text-align:center;font-size:12px;color:var(--muted);margin-top:10px}
.quiz-cfg{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px}
.cfg-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px}
.q-opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.qo{padding:7px 15px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;transition:all .15s}
.qo.active{border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,.1)}
.q-score{display:flex;gap:20px;justify-content:center;margin-bottom:14px;font-size:13px}
.q-score span{color:var(--muted)}.q-score strong{color:var(--text)}
.q-question{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:12px;text-align:center}
.q-pw{font-size:32px;font-weight:700;margin-bottom:5px}
.q-ph{font-size:12px;color:var(--muted)}
.q-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.q-choice{padding:14px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;text-align:left;font-size:13px;transition:all .15s;line-height:1.5}
.q-choice:hover:not(.dis){border-color:var(--accent)}
.q-choice.correct{border-color:var(--green);background:rgba(67,233,123,.1);color:var(--green)}
.q-choice.wrong{border-color:var(--red);background:rgba(255,107,107,.1);color:var(--red)}
.q-choice.dis{cursor:default}
.q-fb{text-align:center;font-size:13px;padding:10px;border-radius:8px;margin-bottom:10px;display:none}
.q-fb.show{display:block}
.q-fb.correct{background:rgba(67,233,123,.1);color:var(--green)}
.q-fb.wrong{background:rgba(255,107,107,.1);color:var(--red)}
.search-row{display:flex;gap:10px;margin-bottom:12px}
.search-row input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 14px;font-size:13px;outline:none;transition:border-color .15s}
.search-row input:focus{border-color:var(--accent)}
.wl-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.wf{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;transition:all .15s}
.wf.active{border-color:var(--accent);color:var(--accent)}
.word-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.wrow{display:grid;grid-template-columns:36px 46px 148px 160px 1fr 68px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;font-size:13px;transition:background .1s}
.wrow:last-child{border-bottom:none}
.wrow:hover{background:var(--card)}
.wrow.hdr{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:var(--card)}
.wrow .ww{font-weight:700;color:var(--accent);display:flex;align-items:center;gap:4px}
.wrow .wm{font-size:12px}.wrow .ws{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.sdot.mastered{background:var(--green)}.sdot.learning{background:var(--yellow)}.sdot.new{background:var(--border)}
.wst{display:flex;align-items:center;gap:5px;font-size:11px}
.sm{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:1px 3px;border-radius:3px;transition:color .1s;line-height:1}
.sm:hover{color:var(--accent)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);padding:9px 18px;border-radius:8px;font-size:13px;transition:transform .3s;z-index:999}
#toast.show{transform:translateX(-50%) translateY(0)}
h2{font-size:18px;margin-bottom:16px}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.gap{margin-top:22px}
/* Prev / Next nav */
.fc-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px}
.fc-nav .btn{min-width:100px}
/* Error word answer card */
.err-ans-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-top:12px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.err-ans-word{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px}
.err-ans-meaning{font-size:14px;color:var(--yellow);margin-bottom:8px}
.err-ans-syns{display:flex;flex-wrap:wrap;gap:6px}
.err-ans-syn{padding:3px 11px;background:var(--card);border:1px solid var(--border);border-radius:100px;font-size:12px;color:var(--text)}
/* Spelling quiz */
.spell-wrap{margin-bottom:12px}
.spell-inputs-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.spell-input{width:100%;background:var(--card);border:2px solid var(--border);color:var(--text);border-radius:10px;padding:13px 15px;font-size:20px;text-align:center;outline:none;transition:border-color .2s;font-family:inherit;letter-spacing:.04em}
.spell-input:focus{border-color:var(--accent)}
.spell-input.ok{border-color:var(--green);background:rgba(67,233,123,.07)}
.spell-input.no{border-color:var(--red);background:rgba(255,107,107,.07)}
.spell-label{font-size:11px;color:var(--muted);text-align:center;margin-bottom:3px;letter-spacing:.03em}
.spell-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:4px}
@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .cat-stats{grid-template-columns:1fr}
  .q-choices{grid-template-columns:1fr}
  .wrow{grid-template-columns:36px 120px 1fr 60px}
  .wrow .wm,.wrow .ws{display:none}
  nav{padding:10px}
  .nb{padding:6px 10px;font-size:12px}
  .fc-word{font-size:30px}
}
</style>
</head>
<body>
<nav>
  <div class="logo">雅思539考点词</div>
  <button class="nb active" onclick="showPage('home')">总览</button>
  <button class="nb" onclick="showPage('flashcard')">闪卡</button>
  <button class="nb" onclick="showPage('quiz')">测验</button>
  <button class="nb" onclick="showPage('words')">词表</button>
</nav>

<!-- HOME -->
<div class="page active" id="page-home">
  <h2>学习进度</h2>
  <div class="stats-grid">
    <div class="stat-card sc-blue"><div class="sn" id="st-total">—</div><div class="sl">总词数</div></div>
    <div class="stat-card sc-green"><div class="sn" id="st-mastered">—</div><div class="sl">已掌握</div></div>
    <div class="stat-card sc-yellow"><div class="sn" id="st-learning">—</div><div class="sl">学习中</div></div>
    <div class="stat-card sc-red"><div class="sn" id="st-new">—</div><div class="sl">未学习</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="cat-stats">
    <div class="cat-stat cs1">
      <div class="cs-head"><span class="cat-badge cb1">1类</span> 核心高频词 (1-120)</div>
      <div class="cs-bar"><div class="cs-fill" id="cs1-fill" style="width:0%"></div></div>
      <div class="cs-nums" id="cs1-nums">— / — 已掌握</div>
    </div>
    <div class="cat-stat cs2">
      <div class="cs-head"><span class="cat-badge cb2">2类</span> 次级词汇 (121-376)</div>
      <div class="cs-bar"><div class="cs-fill" id="cs2-fill" style="width:0%"></div></div>
      <div class="cs-nums" id="cs2-nums">— / — 已掌握</div>
    </div>
    <div class="cat-stat cs3">
      <div class="cs-head"><span class="cat-badge cb3">3类</span> 同义词/接受词</div>
      <div class="cs-bar"><div class="cs-fill" id="cs3-fill" style="width:0%"></div></div>
      <div class="cs-nums" id="cs3-nums">— / — 已掌握</div>
    </div>
  </div>
  <div class="actions">
    <button class="btn btn-p" onclick="goFC('all','all')">开始刷卡</button>
    <button class="btn btn-g" onclick="goFC('1','all')">刷 1类</button>
    <button class="btn btn-g" onclick="goFC('2','all')">刷 2类</button>
    <button class="btn btn-g" onclick="goFC('3','all')">刷 3类</button>
    <button class="btn btn-g" onclick="showPage('quiz')">开始测验</button>
    <button class="btn btn-g" onclick="goErrDrill()" id="btn-err-drill" style="display:none">错词重刷</button>
    <button class="btn btn-g" onclick="doReset()" style="color:var(--red);margin-left:auto">重置进度</button>
  </div>
  <div class="gap">
    <h2>最近错误</h2>
    <div id="err-log" class="empty">暂无错题</div>
    <div id="err-ans-card" style="display:none"></div>
  </div>
</div>

<!-- FLASHCARD -->
<div class="page" id="page-flashcard">
  <div class="fc-top">
    <button class="btn btn-g btn-sm" onclick="showPage('home')">← 返回</button>
    <div class="pill-row">
      <button class="pill pa-all active" data-cat="all" onclick="fcSetCat(this)">全部</button>
      <button class="pill pa-1" data-cat="1" onclick="fcSetCat(this)">1类</button>
      <button class="pill pa-2" data-cat="2" onclick="fcSetCat(this)">2类</button>
      <button class="pill pa-3" data-cat="3" onclick="fcSetCat(this)">3类</button>
    </div>
    <div class="pill-row">
      <button class="pill pa-status active" data-st="all" onclick="fcSetSt(this)">全部</button>
      <button class="pill pa-status" data-st="new" onclick="fcSetSt(this)">未学</button>
      <button class="pill pa-status" data-st="learning" onclick="fcSetSt(this)">学习中</button>
      <button class="pill pa-status" data-st="mastered" onclick="fcSetSt(this)">已掌握</button>
    </div>
    <label class="fc-auto">
      <input type="checkbox" id="auto-speak" checked> 自动朗读
    </label>
    <button class="btn btn-g btn-sm" onclick="fcShuffle()">随机</button>
    <button class="btn btn-g btn-sm" onclick="fcReset()">重来</button>
  </div>
  <div class="card-area">
    <div class="flashcard" id="fc-card" onclick="fcFlip()">
      <div class="cf">
        <div class="card-tl" id="fc-badge-f"></div>
        <div class="card-tr" id="fc-num-f"></div>
        <div class="fc-word" id="fc-word"></div>
        <div class="fc-hint">点击翻转 · 查看释义</div>
        <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation();doSpeak()">🔊</button>
      </div>
      <div class="cf cf-back">
        <div class="card-tl" id="fc-badge-b"></div>
        <div class="card-tr" id="fc-num-b"></div>
        <div class="fc-meaning" id="fc-meaning"></div>
        <div class="fc-syns" id="fc-syns"></div>
        <div class="syn-translation" id="syn-trans"></div>
        <button class="speak-btn" onclick="event.stopPropagation();doSpeak()">🔊</button>
      </div>
    </div>
  </div>
  <div class="card-marks" id="card-marks" style="display:none">
    <button class="btn btn-red" onclick="fcMark('new')">不认识</button>
    <button class="btn btn-yellow" onclick="fcMark('learning')">模糊</button>
    <button class="btn btn-green" onclick="fcMark('mastered')">已掌握</button>
  </div>
  <div class="fc-nav">
    <button class="btn btn-g" onclick="fcPrev()">← 上一个</button>
    <button class="btn btn-g" onclick="fcNext()">下一个 →</button>
  </div>
  <div class="fc-prog" id="fc-prog"></div>
</div>

<!-- QUIZ -->
<div class="page" id="page-quiz">
  <div id="qz-setup">
    <div style="margin-bottom:14px"><button class="btn btn-g btn-sm" onclick="showPage('home')">← 返回</button></div>
    <h2>测验设置</h2>
    <div class="quiz-cfg">
      <div class="cfg-label">题型</div>
      <div class="q-opts">
        <button class="qo active" data-t="w2m" onclick="qSetOpt(this,'t')">单词 → 含义</button>
        <button class="qo" data-t="m2w" onclick="qSetOpt(this,'t')">含义 → 单词</button>
        <button class="qo" data-t="w2s" onclick="qSetOpt(this,'t')">单词 → 同义词</button>
      </div>
      <div class="cfg-label">答题方式</div>
      <div class="q-opts">
        <button class="qo active" data-m="choice" onclick="qSetOpt(this,'m')">选择题（4选1）</button>
        <button class="qo" data-m="fill" onclick="qSetOpt(this,'m')">填空题（手动输入）</button>
      </div>
      <div class="cfg-label">类别</div>
      <div class="q-opts">
        <button class="qo active" data-c="all" onclick="qSetOpt(this,'c')">全部</button>
        <button class="qo" data-c="1" onclick="qSetOpt(this,'c')">1类</button>
        <button class="qo" data-c="2" onclick="qSetOpt(this,'c')">2类</button>
        <button class="qo" data-c="3" onclick="qSetOpt(this,'c')">3类</button>
      </div>
      <div class="cfg-label">状态</div>
      <div class="q-opts">
        <button class="qo active" data-s="all" onclick="qSetOpt(this,'s')">全部</button>
        <button class="qo" data-s="new" onclick="qSetOpt(this,'s')">未学</button>
        <button class="qo" data-s="learning" onclick="qSetOpt(this,'s')">学习中</button>
        <button class="qo" data-s="mastered" onclick="qSetOpt(this,'s')">已掌握</button>
      </div>
      <div style="margin-top:14px">
        <button class="btn btn-p" onclick="qStart()">开始测验</button>
      </div>
    </div>
  </div>
  <div id="qz-game" style="display:none">
    <div style="margin-bottom:12px;display:flex;align-items:center;gap:10px">
      <button class="btn btn-g btn-sm" onclick="qShowSetup()">← 返回设置</button>
      <button class="btn btn-g btn-sm" onclick="showPage('home')">返回总览</button>
    </div>
    <div class="q-score">
      <span>正确 <strong id="qc" style="color:var(--green)">0</strong></span>
      <span>错误 <strong id="qw" style="color:var(--red)">0</strong></span>
      <span>剩余 <strong id="qr">0</strong></span>
    </div>
    <div class="q-question">

function status(w) { return prog[w.word] || 'new'; }

// Speech
function doSpeak(word) {
  const w = word || document.getElementById('fc-word').textContent;
  if (!w || w === '完成！') return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(w);
  u.lang = 'en-US'; u.rate = 0.85;
  const btn = document.getElementById('speak-btn');
  u.onstart = () => { if (btn) btn.classList.add('on'); };
  u.onend = () => { if (btn) btn.classList.remove('on'); };
  speechSynthesis.speak(u);
}

// Synonym chip click: pronounce + show translation
function clickSyn(chip, word) {
  event.stopPropagation();
  // Highlight active chip
  document.querySelectorAll('.syn-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  // Speak
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.85;
  speechSynthesis.speak(u);
  // Show translation
  const trans = document.getElementById('syn-trans');
  const meaning = DICT[word.toLowerCase()];
  if (meaning) {
    trans.textContent = word + '：' + meaning;
  } else {
    // Try partial match
    const key = Object.keys(DICT).find(k => k.includes(word.toLowerCase()) || word.toLowerCase().includes(k));
    trans.textContent = key ? word + '：' + DICT[key] : word + ' · 点击🔊已朗读';
  }
}

// Pages
function showPage(id) {
  // Save flashcard position before leaving
  if (document.getElementById('page-flashcard').classList.contains('active') && id !== 'flashcard') {
    fcSavePos();
  }
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const i = {home:0,flashcard:1,quiz:2,words:3}[id];
  if (i !== undefined) document.querySelectorAll('.nb')[i].classList.add('active');
  if (id === 'home') updateStats();
  if (id === 'flashcard') buildFC();
  if (id === 'words') renderWL();
}

// Stats
function updateStats() {
  const total = WORDS.length;
  const bycat = {1:{t:0,m:0}, 2:{t:0,m:0}, 3:{t:0,m:0}};
  let mastered = 0, learning = 0;
  const wfc = {all:total,'1':0,'2':0,'3':0,mastered:0,learning:0,new:0};

  WORDS.forEach(w => {
    const s = status(w);
    bycat[w.cat].t++; wfc[String(w.cat)]++;
    if (s === 'mastered') { mastered++; bycat[w.cat].m++; wfc.mastered++; }
    else if (s === 'learning') { learning++; wfc.learning++; }
    else { wfc.new++; }
  });

  document.getElementById('st-total').textContent = total;
  document.getElementById('st-mastered').textContent = mastered;
  document.getElementById('st-learning').textContent = learning;
  document.getElementById('st-new').textContent = total - mastered - learning;
  document.getElementById('prog-fill').style.width = (mastered/total*100).toFixed(1) + '%';

  [1,2,3].forEach(c => {
    const {t,m} = bycat[c];
    document.getElementById('cs'+c+'-fill').style.width = t ? (m/t*100).toFixed(1)+'%' : '0%';
    document.getElementById('cs'+c+'-nums').textContent = m+' / '+t+' 已掌握';
  });

  [['all','all'],['1','1'],['2','2'],['3','3'],['m','mastered'],['l','learning'],['n','new']].forEach(([id,key]) => {
    const el = document.getElementById('wfc-'+id);
    if (el) el.textContent = wfc[key] || 0;
  });

  const div = document.getElementById('err-log');
  const btnDrill = document.getElementById('btn-err-drill');
  if (!errLog.length) {
    div.innerHTML = '<div class="empty">暂无错题</div>';
    if (btnDrill) btnDrill.style.display = 'none';
    const card = document.getElementById('err-ans-card');
    if (card) { card.style.display = 'none'; card.innerHTML = ''; }
  } else {
    if (btnDrill) btnDrill.style.display = '';
    div.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:6px">' +
      errLog.slice(-18).reverse().map(w =>
        `<span onclick="showErrAns('${w.replace(/'/g,"\\'")}',this)" style="padding:4px 12px;background:var(--card);border:1px solid var(--red);border-radius:6px;font-size:12px;color:var(--red);cursor:pointer;transition:all .15s" onmouseenter="this.style.borderColor='var(--yellow)';this.style.color='var(--yellow)'" onmouseleave="this.style.borderColor='var(--red)';this.style.color='var(--red)'">${w}</span>`
      ).join('') + '</div>';
  }
}

// Flashcard
let fcList = [], fcIdx = 0, fcCat = 'all', fcSt = 'all';

function fcSavePos() {
  sessionStorage.setItem('fc_key', fcCat + '_' + fcSt);
  sessionStorage.setItem('fc_idx', fcIdx);
  // save word at current position so we can re-anchor after list changes
  if (fcList[fcIdx]) sessionStorage.setItem('fc_word', fcList[fcIdx].word);
}

function goFC(cat, st) {
  fcCat = cat; fcSt = st;
  document.querySelectorAll('#page-flashcard .pill[data-cat]').forEach(p => p.classList.toggle('active', p.dataset.cat === cat));
  document.querySelectorAll('#page-flashcard .pill[data-st]').forEach(p => p.classList.toggle('active', p.dataset.st === st));
  buildFC(); showPage('flashcard');
}
function fcSetCat(btn) {
  document.querySelectorAll('#page-flashcard .pill[data-cat]').forEach(p => p.classList.remove('active'));
  btn.classList.add('active'); fcCat = btn.dataset.cat; buildFC();
}
function fcSetSt(btn) {
  document.querySelectorAll('#page-flashcard .pill[data-st]').forEach(p => p.classList.remove('active'));
  btn.classList.add('active'); fcSt = btn.dataset.st; buildFC();
}
function buildFC() {
  fcList = WORDS.filter(w => {
    const cOk = fcCat === 'all' || String(w.cat) === fcCat;
    // 'all' 模式自动排除已掌握，让已掌握不重复出现；可选 '已掌握' 筛选器来专项复习
    const s = status(w);
    const sOk = fcSt === 'all' ? s !== 'mastered' : s === fcSt;
    return cOk && sOk;
  });

  // 尝试恢复上次位置
  const savedKey = sessionStorage.getItem('fc_key');
  const savedWord = sessionStorage.getItem('fc_word');
  const savedIdx = parseInt(sessionStorage.getItem('fc_idx') || '0');
  if (savedKey === fcCat + '_' + fcSt) {
    // 先尝试按单词锚定（列表可能因标记而变化）
    const anchor = fcList.findIndex(w => w.word === savedWord);
    fcIdx = anchor >= 0 ? anchor : (savedIdx < fcList.length ? savedIdx : 0);
  } else {
    fcIdx = 0;
  }

  if (!fcList.length) {
    toast(fcSt === 'all' ? '🎉 全部已掌握！可切换到「已掌握」复习' : '没有符合条件的单词');
    return;
  }
  showCard();
}
function showCard() {
  const card = document.getElementById('fc-card');
  card.classList.remove('flipped');
  document.getElementById('card-marks').style.display = 'none';
  document.getElementById('syn-trans').textContent = '';

  if (fcIdx >= fcList.length) {
    document.getElementById('fc-word').textContent = '完成！';
    document.getElementById('fc-meaning').textContent = '本轮结束';
    document.getElementById('fc-syns').innerHTML = '';
    ['fc-badge-f','fc-badge-b','fc-num-f','fc-num-b'].forEach(id => document.getElementById(id).innerHTML = '');
    document.getElementById('fc-prog').textContent = fcList.length + ' / ' + fcList.length;
    return;
  }
  const w = fcList[fcIdx];
  const badge = `<span class="cat-badge cb${w.cat}">${w.cat}类</span>`;
  document.getElementById('fc-badge-f').innerHTML = badge;
  document.getElementById('fc-badge-b').innerHTML = badge;
  const numStr = (fcIdx+1) + ' / ' + fcList.length;
  document.getElementById('fc-num-f').textContent = numStr;
  document.getElementById('fc-num-b').textContent = numStr;
  document.getElementById('fc-word').textContent = w.word;
  document.getElementById('fc-meaning').textContent = w.meaning || '—';

  // Synonym chips — clickable with pronunciation + translation
  const syns = w.synonyms ? w.synonyms.split(';').filter(s => s.trim()) : [];
  document.getElementById('fc-syns').innerHTML = syns.map(s => {
    const sw = s.trim();
    const esc = sw.replace(/\\/g,'\\\\').replace(/'/g,"\'");
    return `<span class="syn-chip" onclick="clickSyn(this,'${esc}')"><span class="chip-icon">🔊</span>${sw}</span>`;
  }).join('');

  document.getElementById('fc-prog').textContent = (fcIdx+1) + ' / ' + fcList.length + '  ·  ' + stLabel(status(w));

  if (document.getElementById('auto-speak').checked) {
    setTimeout(() => doSpeak(w.word), 200);
  }
}
function fcFlip() {
  if (fcIdx >= fcList.length) return;
  document.getElementById('fc-card').classList.toggle('flipped');
  const flipped = document.getElementById('fc-card').classList.contains('flipped');
  document.getElementById('card-marks').style.display = flipped ? 'flex' : 'none';
}
function fcMark(s) {
  if (fcIdx >= fcList.length) return;
  const w = fcList[fcIdx];
  prog[w.word] = s;
  if (s === 'new') { errLog = errLog.filter(e => e !== w.word); errLog.push(w.word); if (errLog.length > 60) errLog.shift(); }
  if (s === 'mastered' && fcSt === 'all') {
    // 立即从当前列表移除，不再出现
    fcList.splice(fcIdx, 1);
    if (fcIdx >= fcList.length) fcIdx = Math.max(0, fcList.length - 1);
  } else {
    fcIdx++;
  }
  save(); fcSavePos(); showCard(); updateStats();
}
function fcPrev() {
  if (fcIdx <= 0) { toast('已是第一张'); return; }
  fcIdx--;
  document.getElementById('fc-card').classList.remove('flipped');
  document.getElementById('card-marks').style.display = 'none';
  fcSavePos(); showCard();
}
function fcNext() {
  if (fcIdx >= fcList.length - 1) { toast('已是最后一张'); return; }
  fcIdx++;
  document.getElementById('fc-card').classList.remove('flipped');
  document.getElementById('card-marks').style.display = 'none';
  fcSavePos(); showCard();
}
function fcShuffle() {
  for (let i=fcList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcList[i],fcList[j]]=[fcList[j],fcList[i]];}
  fcIdx=0; showCard(); toast('已随机排序');
}
function fcReset() { fcIdx = 0; sessionStorage.removeItem('fc_key'); showCard(); }

// Quiz
let qT='w2m', qM='choice', qC='all', qS='all', qList=[], qIdx=0, qOK=0, qNG=0;

function qSetOpt(btn, key) {
  btn.closest('.q-opts').querySelectorAll('.qo').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (key === 't') qT = btn.dataset.t;
  if (key === 'm') qM = btn.dataset.m;
  if (key === 'c') qC = btn.dataset.c;
  if (key === 's') qS = btn.dataset.s;
}

function qStart() {
  let pool = WORDS.filter(w => {
    const cOk = qC === 'all' || String(w.cat) === qC;
    const sOk = qS === 'all' || status(w) === qS;
    return cOk && sOk;
  });
  if (qT === 'w2m') pool = pool.filter(w => w.meaning);
  if (qT === 'w2s') pool = pool.filter(w => w.synonyms);
  const minNeeded = qM === 'choice' ? 4 : 1;
  if (pool.length < minNeeded) { toast(minNeeded === 4 ? '该范围单词不足4个' : '没有符合条件的单词'); return; }
  qList = [...pool].sort(() => Math.random() - .5);
  qIdx = 0; qOK = 0; qNG = 0;
  document.getElementById('qz-setup').style.display = 'none';
  document.getElementById('qz-game').style.display = 'block';
  document.getElementById('qz-result').style.display = 'none';
  renderQ();
}

// Build prompt/correct/getC for current question type
function qBuild(w) {
  if (qT === 'w2m') return { prompt: w.word, hint: '写出或选择正确含义', correct: w.meaning, getC: x => x.meaning, placeholder: '输入该单词的含义...' };
  if (qT === 'm2w') return { prompt: w.meaning, hint: '写出或选择对应单词', correct: w.word, getC: x => x.word, placeholder: '输入对应的英文单词...' };
  // w2s
  const syns = (w.synonyms || '').split(';').map(s => s.trim()).filter(Boolean);
  return { prompt: w.word, hint: '写出或选择一个同义词', correct: syns[0] || '', syns, getC: x => (x.synonyms || '').split(';')[0].trim(), placeholder: '输入任意一个同义词...' };
}

function renderQ() {
  if (qIdx >= qList.length) { showResult(); return; }
  const w = qList[qIdx];
  document.getElementById('qc').textContent = qOK;
  document.getElementById('qw').textContent = qNG;
  document.getElementById('qr').textContent = qList.length - qIdx;
  document.getElementById('q-fb').className = 'q-fb';
  document.getElementById('q-next').style.display = 'none';

  const { prompt, hint, correct, getC, placeholder } = qBuild(w);
  document.getElementById('q-word').textContent = prompt;
  document.getElementById('q-hint').textContent = hint;

  const isFill = qM === 'fill';
  document.getElementById('q-choices').style.display = isFill ? 'none' : '';
  document.getElementById('spell-wrap').style.display = isFill ? 'block' : 'none';

  if (isFill) {
    const container = document.getElementById('spell-inputs-wrap');
    container.innerHTML = '';

    // w2s: 每个同义词一个框；其他题型一个框
    const syns = qT === 'w2s'
      ? (w.synonyms || '').split(';').map(s => s.trim()).filter(Boolean)
      : null;
    const boxCount = syns ? syns.length : 1;

    for (let i = 0; i < boxCount; i++) {
      if (syns) {
        const lbl = document.createElement('div');
        lbl.className = 'spell-label';
        lbl.textContent = `同义词 ${i + 1} / ${boxCount}`;
        container.appendChild(lbl);
      }
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'spell-input';
      inp.placeholder = syns ? '输入同义词...' : placeholder;
      inp.autocomplete = 'off';
      inp.spellcheck = false;
      inp.dataset.idx = i;
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          // Enter 跳到下一个框，最后一个框提交
          const boxes = container.querySelectorAll('input');
          const next = boxes[i + 1];
          if (next) next.focus(); else checkSpell();
        }
      });
      container.appendChild(inp);
    }

    const hintMap = {
      w2m: '输入含义或任意英文同义词',
      m2w: '输入对应的英文单词',
      w2s: `共 ${boxCount} 个同义词，每格填一个，顺序不限，允许 1-2 个拼写误差`,
    };
    document.getElementById('spell-hint').textContent = hintMap[qT] || 'Enter 提交';
    setTimeout(() => container.querySelector('input')?.focus(), 50);
    return;
  }

  // Choice mode
  const pool = WORDS.filter(x => x.word !== w.word && getC(x) && getC(x) !== correct);
  const wrongs = [], used = new Set([correct]);
  [...pool].sort(() => Math.random() - .5).forEach(x => {
    if (wrongs.length >= 3) return;
    const c = getC(x);
    if (c && !used.has(c)) { used.add(c); wrongs.push(c); }
  });
  const choices = [correct, ...wrongs].sort(() => Math.random() - .5);
  document.getElementById('q-choices').innerHTML = choices.map(c =>
    `<button class="q-choice" data-ans="${encodeURIComponent(c)}">${c}</button>`
  ).join('');
  document.querySelectorAll('.q-choice').forEach(btn => {
    btn.addEventListener('click', () => checkQ(btn, decodeURIComponent(btn.dataset.ans), correct, w.word));
  });
}

function checkQ(btn, chosen, correct, wkey) {
  document.querySelectorAll('.q-choice').forEach(b => b.classList.add('dis'));
  const fb = document.getElementById('q-fb');
  if (chosen === correct) {
    btn.classList.add('correct'); fb.textContent = '正确！'; fb.className = 'q-fb show correct'; qOK++;
    if (prog[wkey] !== 'mastered') prog[wkey] = 'learning';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.q-choice').forEach(b => { if (decodeURIComponent(b.dataset.ans) === correct) b.classList.add('correct'); });
    fb.textContent = '错误，正确答案：' + correct; fb.className = 'q-fb show wrong'; qNG++;
    prog[wkey] = 'learning';
    errLog = errLog.filter(e => e !== wkey); errLog.push(wkey); if (errLog.length > 60) errLog.shift();
  }
  save();
  document.getElementById('qc').textContent = qOK;
  document.getElementById('qw').textContent = qNG;
  document.getElementById('q-next').style.display = 'inline-block';
}

// Levenshtein distance
function editDist(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, (_, i) => Array.from({length: n + 1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

// Fuzzy match: exact OR normalized OR within edit distance tolerance
function fuzzyMatch(target, typed) {
  if (!target || !typed) return false;
  const norm = s => s.replace(/\s+/g, ' ').trim().toLowerCase();
  const t = norm(target), u = norm(typed);
  if (t === u) return true;
  // Allow 1 error for ≤6 chars, 2 errors for longer
  const tol = t.length <= 6 ? 1 : 2;
  return editDist(t, u) <= tol;
}

function checkSpell() {
  if (qIdx >= qList.length) return;
  const w = qList[qIdx];
  const container = document.getElementById('spell-inputs-wrap');
  const inputs = Array.from(container.querySelectorAll('input'));
  if (!inputs.length) return;

  const allTyped = inputs.map(inp => inp.value.trim());
  if (allTyped.every(v => !v)) return;

  const allSyns = (w.synonyms || '').split(';').map(s => s.trim()).filter(Boolean);
  const fb = document.getElementById('q-fb');
  let overallOk = false;

  if (qT === 'w2s') {
    // 每个框匹配一个同义词，顺序不限，用 fuzzy match
    const usedSyn = new Set();
    let allBoxOk = true;

    inputs.forEach(inp => {
      inp.disabled = true;
      const typed = inp.value.trim();
      if (!typed) { inp.className = 'spell-input no'; allBoxOk = false; return; }
      // Find a not-yet-used synonym that fuzzy-matches
      const matchIdx = allSyns.findIndex((s, i) => !usedSyn.has(i) && fuzzyMatch(s, typed));
      if (matchIdx >= 0) {
        usedSyn.add(matchIdx);
        inp.className = 'spell-input ok';
      } else {
        inp.className = 'spell-input no';
        allBoxOk = false;
      }
    });

    overallOk = allBoxOk && usedSyn.size === allSyns.length;
    if (overallOk) {
      fb.textContent = '全部正确！✓'; fb.className = 'q-fb show correct'; qOK++;
      if (prog[w.word] !== 'mastered') prog[w.word] = 'learning';
    } else {
      const ref = allSyns.join(' / ');
      fb.textContent = '有误！参考答案：' + ref; fb.className = 'q-fb show wrong'; qNG++;
      prog[w.word] = 'learning';
      errLog = errLog.filter(e => e !== w.word); errLog.push(w.word); if (errLog.length > 60) errLog.shift();
    }

  } else {
    // w2m / m2w：单框，fuzzy match
    const inp = inputs[0];
    inp.disabled = true;
    const typed = inp.value.trim();

    let accepted = [];
    let refAnswer = '';
    if (qT === 'w2m') {
      accepted = [w.meaning, ...allSyns, w.word];
      refAnswer = w.meaning + (allSyns.length ? '  |  ' + allSyns.slice(0, 3).join(' / ') : '');
    } else {
      accepted = [w.word, ...allSyns];
      refAnswer = w.word + (allSyns.length ? ' / ' + allSyns.slice(0, 2).join(' / ') : '');
    }

    overallOk = accepted.some(a => fuzzyMatch(a, typed));
    if (overallOk) {
      inp.className = 'spell-input ok';
      fb.textContent = '正确！✓'; fb.className = 'q-fb show correct'; qOK++;
      if (prog[w.word] !== 'mastered') prog[w.word] = 'learning';
    } else {
      inp.className = 'spell-input no';
      fb.textContent = '差一点！参考：' + refAnswer; fb.className = 'q-fb show wrong'; qNG++;
      prog[w.word] = 'learning';
      errLog = errLog.filter(e => e !== w.word); errLog.push(w.word); if (errLog.length > 60) errLog.shift();
    }
  }

  save();
  document.getElementById('qc').textContent = qOK;
  document.getElementById('qw').textContent = qNG;
  document.getElementById('q-next').style.display = 'inline-block';
}

function qNext() { qIdx++; renderQ(); }
function showResult(){
  document.getElementById('qz-game').style.display='none';
  document.getElementById('qz-result').style.display='block';
  const tot=qOK+qNG,pct=tot?Math.round(qOK/tot*100):0;
  document.getElementById('q-emoji').textContent=pct>=80?'🎉':pct>=60?'💪':'📚';
  document.getElementById('q-rt').textContent='得分 '+pct+'%';
  document.getElementById('q-rs').textContent='共'+tot+'题，答对'+qOK+'，答错'+qNG;
  updateStats();
}
function qShowSetup(){
  document.getElementById('qz-setup').style.display='block';
  document.getElementById('qz-game').style.display='none';
  document.getElementById('qz-result').style.display='none';
}

// Word list
let wlF='all';
function setWF(btn){document.querySelectorAll('.wf').forEach(b=>b.classList.remove('active'));btn.classList.add('active');wlF=btn.dataset.f;renderWL();}
function renderWL(){
  const q=(document.getElementById('wl-q')?.value||'').toLowerCase();
  const list=WORDS.filter(w=>{
    const fOk=wlF==='all'||String(w.cat)===wlF||(wlF==='mastered'&&status(w)==='mastered')||(wlF==='learning'&&status(w)==='learning')||(wlF==='new'&&status(w)==='new');
    const sOk=!q||w.word.toLowerCase().includes(q)||w.meaning.includes(q)||w.synonyms.toLowerCase().includes(q);
    return fOk&&sOk;
  });
  const body=document.getElementById('wl-body');
  if(!list.length){body.innerHTML='<div class="empty">没有匹配的单词</div>';return;}
  body.innerHTML=list.map(w=>{
    const s=status(w);
    const we=w.word.replace(/'/g,"\'");
    return `<div class="wrow">
      <div style="color:var(--muted);font-size:11px">${w.num}</div>
      <div><span class="cat-badge cb${w.cat}">${w.cat}类</span></div>
      <div class="ww">${w.word}<button class="sm" onclick="doSpeak('${we}')" title="朗读">🔊</button></div>
      <div class="wm">${w.meaning}</div>
      <div class="ws">${w.synonyms}</div>
      <div class="wst"><span class="sdot ${s}"></span>${stLabel(s)}</div>
    </div>`;
  }).join('');
}
function stLabel(s){return s==='mastered'?'掌握':s==='learning'?'学习中':'未学';}
function doReset(){if(!confirm('确定重置所有进度？'))return;prog={};errLog=[];save();updateStats();toast('已重置');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// Error word answer reveal
function showErrAns(word, chip) {
  const card = document.getElementById('err-ans-card');
  // toggle off if same word clicked again
  if (card._current === word && card.style.display !== 'none') {
    card.style.display = 'none'; card._current = null;
    document.querySelectorAll('#err-log span').forEach(s => s.style.fontWeight = '');
    return;
  }
  document.querySelectorAll('#err-log span').forEach(s => s.style.fontWeight = '');
  chip.style.fontWeight = '700';
  card._current = word;
  const w = WORDS.find(x => x.word === word);
  const meaning = w ? w.meaning : '—';
  const syns = w && w.synonyms ? w.synonyms.split(';').map(s => s.trim()).filter(Boolean) : [];
  card.innerHTML = `<div class="err-ans-card">
    <div class="err-ans-word">${word}</div>
    <div class="err-ans-meaning">${meaning}</div>
    ${syns.length ? '<div class="err-ans-syns">' + syns.map(s => `<span class="err-ans-syn">${s}</span>`).join('') + '</div>' : ''}
  </div>`;
  card.style.display = 'block';
}

// 错词重刷默写
let erdList = [], erdIdx = 0, erdOK = 0, erdNG = 0;

function goErrDrill() {
  if (!errLog.length) { toast('暂无错词'); return; }
  startErrDrill();
}

function startErrDrill() {
  erdList = errLog.slice().reverse().map(w => WORDS.find(x => x.word === w)).filter(Boolean);
  erdIdx = 0; erdOK = 0; erdNG = 0;
  document.getElementById('erd-main').style.display = '';
  document.getElementById('erd-result').style.display = 'none';
  showPage('errdrill');
  renderErdCard();
}

function renderErdCard() {
  if (erdIdx >= erdList.length) { showErdResult(); return; }
  const w = erdList[erdIdx];
  const syns = (w.synonyms || '').split(';').map(s => s.trim()).filter(Boolean);
  document.getElementById('erd-prog').textContent = (erdIdx + 1) + ' / ' + erdList.length;
  document.getElementById('erd-word').textContent = w.word;
  const fb = document.getElementById('erd-fb');
  fb.className = 'err-drill-fb';
  fb.textContent = '';
  document.getElementById('erd-submit').style.display = '';
  document.getElementById('erd-next').style.display = 'none';

  const wrap = document.getElementById('erd-inputs');
  wrap.innerHTML = '';
  syns.forEach((_, i) => {
    const lbl = document.createElement('div');
    lbl.className = 'spell-label';
    lbl.textContent = '同义词 ' + (i + 1) + ' / ' + syns.length;
    wrap.appendChild(lbl);
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'spell-input';
    inp.placeholder = '输入同义词...';
    inp.autocomplete = 'off';
    inp.spellcheck = false;
    inp.dataset.idx = i;
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const boxes = wrap.querySelectorAll('input');
        const next = boxes[i + 1];
        if (next) next.focus(); else checkErdSpell();
      }
    });
    wrap.appendChild(inp);
  });

  document.getElementById('erd-hint').textContent = syns.length + ' 个同义词，顺序不限，允许 1-2 个拼写误差';
  setTimeout(() => wrap.querySelector('input')?.focus(), 50);
}

function checkErdSpell() {
  const w = erdList[erdIdx];
  const syns = (w.synonyms || '').split(';').map(s => s.trim()).filter(Boolean);
  const inputs = Array.from(document.getElementById('erd-inputs').querySelectorAll('input'));
  const fb = document.getElementById('erd-fb');

  const usedSyn = new Set();
  let allOk = true;
  inputs.forEach(inp => {
    inp.disabled = true;
    const typed = inp.value.trim();
    if (!typed) { inp.className = 'spell-input no'; allOk = false; return; }
    const matchIdx = syns.findIndex((s, i) => !usedSyn.has(i) && fuzzyMatch(s, typed));
    if (matchIdx >= 0) { usedSyn.add(matchIdx); inp.className = 'spell-input ok'; }
    else { inp.className = 'spell-input no'; allOk = false; }
  });
  if (usedSyn.size < syns.length) allOk = false;

  document.getElementById('erd-submit').style.display = 'none';
  document.getElementById('erd-next').style.display = '';

  if (allOk) {
    fb.textContent = '全部正确！已从错词中移除';
    fb.className = 'err-drill-fb show correct';
    erdOK++;
    errLog = errLog.filter(e => e !== w.word);
    save(); updateStats();
  } else {
    fb.textContent = '未完全正确，参考答案：' + syns.join(' / ');
    fb.className = 'err-drill-fb show wrong';
    erdNG++;
  }
}

function erdNext() {
  erdIdx++;
  renderErdCard();
}

function showErdResult() {
  document.getElementById('erd-main').style.display = 'none';
  document.getElementById('erd-result').style.display = 'block';
  const tot = erdOK + erdNG;
  const pct = tot ? Math.round(erdOK / tot * 100) : 0;
  document.getElementById('erd-emoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';
  document.getElementById('erd-rt').textContent = '得分 ' + pct + '%';
  document.getElementById('erd-rs').textContent = '共 ' + tot + ' 个，全对 ' + erdOK + ' 个，有误 ' + erdNG + ' 个';
  updateStats();
}

document.addEventListener('DOMContentLoaded', () => { updateStats(); });
